# Builds and publishes the site to GitHub Pages when explicitly enabled.
# Set repo variable ENABLE_GITHUB_PAGES=true after Pages is available for this repo.
# (Repo Settings → Pages → Source must be set to "GitHub Actions".)
name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
    # docs and pipeline-only changes don't alter the built site — skip the deploy
    # (a push deploys unless EVERY changed file matches one of these)
    paths-ignore:
      - '**.md'
      - '.gitignore'
      - 'scripts/**' # data pipeline & dev tooling: affects future data runs, not dist
      - '.github/workflows/update-data.yml'
      - '.github/workflows/ci.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    if: vars.ENABLE_GITHUB_PAGES == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: '25'
          cache: npm
      - run: npm ci
      - run: npm run build
      - uses: actions/configure-pages@v5
        with:
          enablement: true # creates/enables the Pages site on first run
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist
      - id: deployment
        uses: actions/deploy-pages@v4
